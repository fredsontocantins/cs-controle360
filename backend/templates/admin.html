{% extends "base.html" %}

{% block content %}
<section class="panel">
  <header>
    <div class="token-banner">
      <h3>Painel Administrativo</h3>
      <p>Token de API: <code>{{ admin_token }}</code></p>
    </div>
  </header>

  <div class="admin-actions">
    <div class="form-card">
      <h4>📦 Novo Módulo</h4>
      <form action="/api/modules" method="post">
        <div class="form-field">
          <label>Nome do Módulo</label>
          <input name="name" placeholder="Ex: Catálogo" required />
        </div>
        <button class="button" type="submit">Cadastrar</button>
      </form>
    </div>

    <div class="card">
      <h4>Módulos Cadastrados</h4>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          {% for module in modules %}
          <tr>
            <td>{{ module.id }}</td>
            <td>{{ module.name }}</td>
            <td>
              <form action="/admin/modules/{{ module.id }}/delete" method="post" onsubmit="return confirm('Apagar módulo?')">
                <button class="button danger" type="submit">Eliminar</button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>
{% endblock % title %}
