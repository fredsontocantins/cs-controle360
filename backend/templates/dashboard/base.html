<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>{% block title %}CS Controle 360{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

    <div class="brand">
      <strong>CS Controle 360º</strong>
      <span>Versão, homologação e customização</span>
    </div>
    <nav class="breadcrumbs">
      <a href="/">Dashboard</a>
      <a href="/homologacao">Homologação</a>
      <a href="/customizacao">Customização</a>
      <a href="/atividade">Atividades</a>
      <a href="/release">Releases</a>
      <a href="/relatorios">Relatórios</a>
      <a href="/admin">Admin</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>
    <p>CS Controle 360 - Sistema de Gestão de Releases e Homologações</p>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
