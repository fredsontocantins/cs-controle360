{% extends "dashboard/base.html" %}

{% block title %}Relatórios - CS Controle 360{% endblock %}

{% block content %}
<div class="entity-page">
  <h1>Relatórios Gerenciais</h1>
  <p class="subtitle">Gere relatórios de tickets e atividades extraídas de release notes</p>

  <div class="report-section">
    <h2>Selecionar Release</h2>
    <div class="form-field">
      <select id="release-select" onchange="loadReport()">
        <option value="">Todos os releases</option>
        {% for r in releases %}
        <option value="{{ r.id }}">{{ r.release_name }} ({{ r.version }}) - {{ r.applies_on }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div id="report-content" style="display: none;">
    <div class="report-actions">
      <button onclick="showHTMLReport()" class="btn btn-primary">Ver Relatório HTML</button>
      <button onclick="showJSONReport()" class="btn btn-secondary">Ver JSON</button>
      <button onclick="downloadTextReport()" class="btn btn-secondary">Download Texto</button>
    </div>

    <div id="summary-stats" class="summary-stats"></div>
    <div id="tickets-list" class="tickets-list"></div>
  </div>

  <div id="report-modal" class="modal" style="display: none; width: 90%; max-width: 1200px;">
    <div class="modal-content" style="max-height: 90vh; overflow: auto;">
      <button onclick="closeReportModal()" class="btn btn-secondary" style="float: right;">Fechar</button>
      <h2>Relatório Gerencial</h2>
      <div id="modal-content"></div>
    </div>
  </div>
</div>

<script>
let currentReport = null;

async function loadReport() {
  const releaseId = document.getElementById('release-select').value;
  const endpoint = releaseId
    ? `/api/reports/ticket-summary?release_id=${releaseId}`
    : '/api/reports/ticket-summary';

  const response = await fetch(endpoint);
  currentReport = await response.json();

  document.getElementById('report-content').style.display = 'block';

  // Update stats
  const statsDiv = document.getElementById('summary-stats');
  statsDiv.innerHTML = `
    <div class="summary-card">
      <h3>Total de Tickets</h3>
      <p class="stat-number">${currentReport.total}</p>
    </div>
    <div class="summary-card">
      <h3>Correções de Bug</h3>
      <p class="stat-number">${currentReport.by_type?.correcao_bug || 0}</p>
    </div>
    <div class="summary-card">
      <h3>Novas Funcionalidades</h3>
      <p class="stat-number">${currentReport.by_type?.nova_funcionalidade || 0}</p>
    </div>
    <div class="summary-card">
      <h3>Melhorias</h3>
      <p class="stat-number">${currentReport.by_type?.melhoria || 0}</p>
    </div>
  `;

  // Update tickets list
  const ticketsDiv = document.getElementById('tickets-list');
  ticketsDiv.innerHTML = '<h3>Tickets</h3>';

  for (const ticket of (currentReport.tickets || [])) {
    const tipoClass = ticket.tipo === 'correcao_bug' ? 'badge-correcao_bug'
                     : ticket.tipo === 'nova_funcionalidade' ? 'badge-nova_funcionalidade'
                     : 'badge-melhoria';
    ticketsDiv.innerHTML += `
      <div class="ticket-item">
        <div class="ticket-header">
          <span class="ticket-number">${ticket.ticket}</span>
          <span class="badge ${tipoClass}">${ticket.tipo_label}</span>
        </div>
        <div class="ticket-body">
          <p><strong>Descrição:</strong> ${ticket.descricao || 'N/A'}</p>
          <p><strong>Resolução:</strong> ${ticket.resolucao || 'N/A'}</p>
        </div>
      </div>
    `;
  }
}

function showHTMLReport() {
  if (!currentReport) return;
  document.getElementById('modal-content').innerHTML = `
    <style>
      .report-html { padding: 20px; font-family: Arial, sans-serif; }
      .report-html h1 { color: #0d3b66; }
      .report-html h2 { color: #2196F3; margin-top: 30px; }
      .report-html .ticket-card { background: #f5f5f5; padding: 15px; margin: 10px 0; border-left: 4px solid #0d3b66; }
      .report-html .ticket-number { font-weight: bold; font-size: 18px; color: #0d3b66; }
    </style>
    <div class="report-html">
      <h1>Relatório Gerencial</h1>
      <p>Gerado em: ${currentReport.generated_at}</p>
      <h2>Resumo</h2>
      <p>Total de Atividades: ${currentReport.total}</p>
      <p>Correções de Bug: ${currentReport.by_type?.correcao_bug || 0}</p>
      <p>Novas Funcionalidades: ${currentReport.by_type?.nova_funcionalidade || 0}</p>
      <p>Melhorias: ${currentReport.by_type?.melhoria || 0}</p>
    </div>
  `;
  document.getElementById('report-modal').style.display = 'block';
}

async function showJSONReport() {
  if (!currentReport) return;
  document.getElementById('modal-content').innerHTML = `
    <pre style="background: #f5f5f5; padding: 20px; overflow: auto;">${JSON.stringify(currentReport, null, 2)}</pre>
  `;
  document.getElementById('report-modal').style.display = 'block';
}

async function downloadTextReport() {
  if (!currentReport) return;
  const releaseId = document.getElementById('release-select').value;
  const endpoint = releaseId
    ? `/api/reports/summary-text?release_id=${releaseId}`
    : '/api/reports/summary-text';

  const response = await fetch(endpoint);
  const data = await response.json();

  const blob = new Blob([data.report], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'relatorio_atividades.txt';
  a.click();
}

function closeReportModal() {
  document.getElementById('report-modal').style.display = 'none';
}
</script>

<style>
.report-section { margin: 20px 0; }
.summary-stats { display: flex; gap: 20px; margin: 20px 0; }
.summary-card { background: #f5f5f5; padding: 20px; border-radius: 8px; text-align: center; }
.summary-card .stat-number { font-size: 32px; font-weight: bold; color: #0d3b66; }
.tickets-list { margin-top: 20px; }
.ticket-item { background: #fff; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 4px; }
.ticket-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.ticket-number { font-weight: bold; font-size: 18px; color: #0d3b66; }
.ticket-body p { margin: 5px 0; }
.report-actions { margin: 20px 0; display: flex; gap: 10px; }
</style>
{% endblock %}
