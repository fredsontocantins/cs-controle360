<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS Controle 360º — Entrar</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="login-body">
    <main class="login-card">
      <h1>CS Controle 360º</h1>
      <p class="login-card__subtitle">Acesse sua conta para continuar.</p>
      {% if error %}
        <div class="alert error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}" />{% endif %}
        <div class="form-field">
          <label for="username">Usuário</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus />
        </div>
        <div class="form-field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button class="button" type="submit">Entrar</button>
      </form>
      <p class="login-card__hint">
        Contas sem senha configurada não conseguem entrar — peça ao administrador para liberar o acesso.
      </p>
    </main>
  </body>
</html>
