<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS Controle 360º — Login</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
      body.login-body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        margin: 0;
        padding: 1rem;
      }
      .login-card {
        width: 100%;
        max-width: 360px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.35);
        padding: 2rem;
      }
      .login-card h1 {
        margin: 0 0 0.25rem;
        font-size: 1.35rem;
        color: #0f172a;
      }
      .login-card p.subtitle {
        margin: 0 0 1.5rem;
        color: #475569;
        font-size: 0.9rem;
      }
      .login-card label {
        display: block;
        margin-top: 1rem;
        font-size: 0.8rem;
        font-weight: 600;
        color: #334155;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .login-card input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 1rem;
        margin-top: 0.35rem;
        box-sizing: border-box;
      }
      .login-card input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }
      .login-card button {
        width: 100%;
        margin-top: 1.5rem;
        padding: 0.65rem;
        background: #2563eb;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
      }
      .login-card button:hover { background: #1d4ed8; }
      .login-card .error {
        margin-top: 1rem;
        padding: 0.65rem 0.85rem;
        background: #fee2e2;
        color: #991b1b;
        border-radius: 8px;
        font-size: 0.85rem;
      }
      .login-card .hint {
        margin-top: 1.25rem;
        color: #64748b;
        font-size: 0.75rem;
        text-align: center;
      }
    </style>
  </head>
  <body class="login-body">
    <main class="login-card">
      <h1>CS Controle 360º</h1>
      <p class="subtitle">Acesse sua conta para continuar</p>
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}" />{% endif %}
        <label for="username">Usuário</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus />
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button type="submit">Entrar</button>
      </form>
      <p class="hint">Contas sem senha configurada não conseguem entrar — peça ao administrador para criar o acesso.</p>
    </main>
  </body>
</html>
