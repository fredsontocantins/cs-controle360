{% extends "base.html" %}

{% block content %}
<section class="panel">
  <header>
    <h3>Editar customização {{ record.proposal }}</h3>
  </header>
  <form class="form-card" action="/admin/customizations/{{ record.id }}/update?api_key={{ admin_token }}" method="post" enctype="multipart/form-data">
    <div class="form-field">
      <label>Etapa</label>
      <select name="stage">
        {% for key,label in stage_labels.items() %}
        <option value="{{ key }}" {% if key == record.stage %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-field">
      <label>Proposta</label>
      <input name="proposal" value="{{ record.proposal }}" />
    </div>
    <div class="form-field">
      <label>Cliente</label>
      <select name="client_select">
        <option value="">Selecione um cliente</option>
        {% for client in clients %}
        <option value="{{ client.id }}" {% if client.id == record.client_id %}selected{% endif %}>{{ client.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-field">
      <label>Cliente (outro)</label>
      <input name="client_manual" value="{{ record.client }}" />
    </div>
    <div class="form-field">
      <label>Módulo</label>
      <select name="module_select">
        <option value="">Selecione um módulo</option>
        {% for module in module_catalog %}
        <option value="{{ module.id or '' }}" {% if module.id == record.module_id %}selected{% endif %}>{{ module.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-field">
      <label>Módulo (outro)</label>
      <input name="module_manual" placeholder="Digite outro módulo" />
    </div>
    <div class="form-field">
      <label>Assunto</label>
      <textarea name="subject">{{ record.subject }}</textarea>
    </div>
    <div class="form-field">
      <label>Responsável</label>
      <input name="owner" value="{{ record.owner }}" />
    </div>
    <div class="form-field">
      <label>Recebido em</label>
      <input type="date" name="received_at" value="{{ record.received_at }}" />
    </div>
    <div class="form-field">
      <label>Status</label>
      <input name="status" value="{{ record.status }}" />
    </div>
    <div class="form-field">
      <label>Valor</label>
      <input type="number" step="0.01" name="value" value="{{ record.value }}" />
    </div>
    <div class="form-field">
      <label>PF</label>
      <input type="number" name="pf" value="{{ record.pf }}" />
    </div>
    <div class="form-field">
      <label>Observações</label>
      <textarea name="observations">{{ record.observations }}</textarea>
    </div>
    <div class="form-field">
      <label>Documento (PDF)</label>
      <input type="file" name="pdf" accept="application/pdf" />
      {% if record.pdf_path %}
      <a class="button secondary" href="/static/{{ record.pdf_path }}" target="_blank">PDF atual</a>
      {% endif %}
    </div>
    <button class="button" type="submit">Atualizar</button>
    <a class="button secondary" href="/admin">Cancelar</a>
  </form>
</section>
{% endblock %}
