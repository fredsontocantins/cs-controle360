<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS Controle</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <strong>CS Controle 360º</strong>
        <span>Versão, homologação e customização</span>
      </div>
      <nav class="breadcrumbs">
        <a href="/">Dashboard</a>
        <a href="/admin">Admin</a>
      </nav>
      <div class="meta">
        <span>Dados sincronizados em {{ snapshot.built_at }}</span>
        <span>{{ snapshot.source }}</span>
      </div>
    </header>
    <main>{% block content %}{% endblock %}</main>
    <footer>
      <p>Atualize os dados e recarregue com <a href="{{ refresh_url }}">esta ação</a>.</p>
    </footer>
    {% block scripts %}{% endblock %}
  </body>
</html>
