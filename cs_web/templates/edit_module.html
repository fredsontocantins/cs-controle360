{% extends "base.html" %}

{% block content %}
<section class="panel">
  <header>
    <h3>Editar módulo {{ record.name }}</h3>
  </header>
  <form class="form-card" action="/admin/modules/{{ record.id }}/update" method="post">
    <div class="form-field">
      <label>Nome</label>
      <input name="name" value="{{ record.name }}" required />
    </div>
    <div class="form-field">
      <label>Responsável</label>
      <input name="owner" value="{{ record.owner }}" />
    </div>
    <div class="form-field">
      <label>Descrição</label>
      <textarea name="description">{{ record.description }}</textarea>
    </div>
    <button class="button" type="submit">Salvar</button>
    <a class="button secondary" href="/admin">Cancelar</a>
  </form>
</section>
{% endblock %}
