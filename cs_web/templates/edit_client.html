{% extends "base.html" %}

{% block content %}
<section class="panel">
  <header>
    <h3>Editar cliente {{ record.name }}</h3>
  </header>
  <form class="form-card" action="/admin/clients/{{ record.id }}/update" method="post">
    <div class="form-field">
      <label>Nome</label>
      <input name="name" value="{{ record.name }}" required />
    </div>
    <div class="form-field">
      <label>Segmento</label>
      <input name="segment" value="{{ record.segment }}" />
    </div>
    <div class="form-field">
      <label>Responsável</label>
      <input name="owner" value="{{ record.owner }}" />
    </div>
    <div class="form-field">
      <label>Notas</label>
      <textarea name="notes">{{ record.notes }}</textarea>
    </div>
    <button class="button" type="submit">Salvar</button>
    <a class="button secondary" href="/admin">Cancelar</a>
  </form>
</section>
{% endblock %}
