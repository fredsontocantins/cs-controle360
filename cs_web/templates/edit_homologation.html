{% extends "base.html" %}

{% block content %}
<section class="panel">
  <header>
    <h3>Editar homologação {{ record.module or "módulo" }}</h3>
  </header>
  <form class="form-card" action="/admin/homologation/{{ record.id }}/update" method="post">
    <div class="form-field">
      <label>Módulo (catálogo)</label>
      <select name="module_select">
        <option value="">Selecione um módulo</option>
        {% for module in module_catalog %}
        <option value="{{ module.id or '' }}" {% if module.id == record.module_id %}selected{% endif %}>{{ module.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-field">
      <label>Outro módulo</label>
      <input name="module_manual" value="" placeholder="Informe se diferente" />
    </div>
    <div class="form-field">
      <label>Cliente</label>
      <select name="client_select">
        <option value="">Selecione um cliente</option>
        {% for client in clients %}
        <option value="{{ client.id }}" {% if client.id == record.client_id %}selected{% endif %}>{{ client.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-field">
      <label>Cliente (outro)</label>
      <input name="client_manual" value="{{ record.client }}" />
    </div>
    <div class="form-field">
      <label>Status</label>
      <input name="status" value="{{ record.status }}" />
    </div>
    <div class="form-field">
      <label>Data do check</label>
      <input type="date" name="check_date" value="{{ record.check_date }}" />
    </div>
    <div class="form-field">
      <label>Solicitado para produção</label>
      <input type="date" name="requested_production_date" value="{{ record.requested_production_date }}" />
    </div>
    <div class="form-field">
      <label>Entrou em produção</label>
      <input type="date" name="production_date" value="{{ record.production_date }}" />
    </div>
    <div class="form-field">
      <label>Versão produção</label>
      <input name="production_version" value="{{ record.production_version }}" />
    </div>
    <div class="form-field">
      <label>Versão homologação</label>
      <input name="homologation_version" value="{{ record.homologation_version }}" />
    </div>
    <div class="form-field">
      <label>Homologado?</label>
      <select name="homologated">
        <option value="">(limpar)</option>
        <option value="Sim" {% if record.homologated == "Sim" %}selected{% endif %}>Sim</option>
        <option value="Não" {% if record.homologated == "Não" %}selected{% endif %}>Não</option>
      </select>
    </div>
    <div class="form-field">
      <label>Observação</label>
      <textarea name="observation">{{ record.observation }}</textarea>
    </div>
    <div class="form-field">
      <label>Aplicado</label>
      <input name="applied" value="{{ record.applied }}" />
    </div>
    <button class="button" type="submit">Atualizar</button>
    <a class="button secondary" href="/admin">Cancelar</a>
  </form>
</section>
{% endblock %}
