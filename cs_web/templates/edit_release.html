{% extends "base.html" %}

{% block content %}
<section class="panel">
  <header>
    <h3>Editar release {{ record.release_name }}</h3>
  </header>
  <form class="form-card" action="/admin/releases/{{ record.id }}/update" method="post" enctype="multipart/form-data">
    <div class="form-field">
      <label>Módulo</label>
      <select name="module_select">
        <option value="">Selecione um módulo</option>
        {% for module in module_catalog %}
        <option value="{{ module.id or '' }}" {% if module.id == record.module_id %}selected{% endif %}>{{ module.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-field">
      <label>Outro módulo</label>
      <input name="module_manual" value="" placeholder="Digite outro módulo" />
    </div>
    <div class="form-field">
      <label>Nome</label>
      <input name="release_name" value="{{ record.release_name }}" required />
    </div>
    <div class="form-field">
      <label>Versão</label>
      <input name="version" value="{{ record.version }}" />
    </div>
    <div class="form-field">
      <label>Aplica em</label>
      <input type="date" name="applies_on" value="{{ record.applies_on }}" />
    </div>
    <div class="form-field">
      <label>Cliente</label>
      <select name="client_select">
        <option value="">Selecione um cliente</option>
        {% for client in clients %}
        <option value="{{ client.id }}" {% if client.id == record.client_id %}selected{% endif %}>{{ client.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-field">
      <label>Cliente (outro)</label>
      <input name="client_manual" value="{{ record.client }}" placeholder="Cliente não cadastrado" />
    </div>
    <div class="form-field">
      <label>Notas</label>
      <textarea name="notes">{{ record.notes }}</textarea>
    </div>
    <div class="form-field">
      <label>PDF atual</label>
      {% if record.pdf_path %}
      <a class="button secondary" href="/static/{{ record.pdf_path }}" target="_blank">Download atual</a>
      {% else %}
      <span>nenhum arquivo</span>
      {% endif %}
    </div>
    <div class="form-field">
      <label>Enviar novo PDF</label>
      <input type="file" name="pdf" accept="application/pdf" />
    </div>
    <button class="button" type="submit">Salvar</button>
    <a class="button secondary" href="/admin">Cancelar</a>
  </form>
</section>
{% endblock %}
