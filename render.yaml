services:
  - type: web
    name: cs-controle360-api
    runtime: docker
    plan: free
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cs-controle360-db
          property: connectionString
      - key: CS_ADMIN_AUTH_ENABLED
        value: "1"
      - key: CS_ALLOW_INSECURE_SECRETS
        value: "0"
      - key: CS_API_KEY
        generateValue: true
      - key: CS_AUTH_SECRET
        generateValue: true
    disk:
      name: uploads-data
      mountPath: /app/backend/static/uploads
      sizeGB: 1

databases:
  - name: cs-controle360-db
    plan: free
    region: oregon
